name: Python tests

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Sync development environment
        run: uv sync --group dev

      - name: Run test_*.py suite
        env:
          PYTHONHASHSEED: "0"
        run: uv run pytest

      - name: Validate reusable workflow metadata
        run: scripts/research_workflow.sh list
